name: "generate-github-contribution-gundam"
description: "Generates GitHub contribution animations with an RX-78-2 Gundam renderer. Outputs SVG."
author: "m-mohamed"

runs:
  using: node24
  main: dist/index.js

inputs:
  github_user_name:
    description: "github user name"
    required: true
  github_token:
    description: "github token used to fetch the contribution calendar. Default to the action token if empty."
    required: false
    default: ${{ github.token }}
  outputs:
    required: false
    description: |
      List of files to generate.
      One file per line. Each output can be customized with query-string options.

      Supported query-string options:

      - palette:      A color preset, one of [github, github-dark, github-light]
      - color_snake:  Accent color for the moving renderer
      - color_dots:   Comma-separated list of dot colors.
                      The first one is 0 contribution, then it goes from the low contribution to the highest.
                      Exactly 5 colors are expected.

      example:
        outputs: |
          dark.svg?palette=github-dark&color_snake=blue
          light.svg?color_snake=#7845ab
          ocean.svg?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9
